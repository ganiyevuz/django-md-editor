<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Post</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
    label { display: block; font-weight: bold; margin-top: 16px; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .submit-btn { margin-top: 20px; padding: 10px 24px; background: #0066cc; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    .submit-btn:hover { background: #0052a3; }
    a { color: #0066cc; }
  </style>
  {{ form.media }}
</head>
<body>
  <h1>Create Post</h1>
  <a href="{% url 'posts:list' %}">&larr; Back to list</a>
  <form method="post">
    {% csrf_token %}
    <label for="{{ form.title.id_for_label }}">Title</label>
    {{ form.title }}
    <label for="{{ form.content.id_for_label }}">Content</label>
    {{ form.content }}
    <button type="submit" class="submit-btn">Save Post</button>
  </form>
</body>
</html>

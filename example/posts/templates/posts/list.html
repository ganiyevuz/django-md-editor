<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Posts</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
    .post-item { margin: 16px 0; padding: 16px; border: 1px solid #ddd; border-radius: 4px; }
    .post-item h2 { margin: 0 0 8px; }
    .post-item small { color: #666; }
    .actions { margin-top: 20px; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Posts</h1>
  <div class="actions">
    <a href="{% url 'posts:create' %}">+ New Post</a>
  </div>
  {% for post in posts %}
    <div class="post-item">
      <h2><a href="{% url 'posts:detail' post.pk %}">{{ post.title }}</a></h2>
      <small>{{ post.created_at }}</small>
    </div>
  {% empty %}
    <p>No posts yet. <a href="{% url 'posts:create' %}">Create one!</a></p>
  {% endfor %}
</body>
</html>

site_name: django-md-editor
site_description: A GitHub-style markdown editor widget for Django forms and admin
site_url: https://ganiyevuz.github.io/django-md-editor/
repo_url: https://github.com/ganiyevuz/django-md-editor
repo_name: ganiyevuz/django-md-editor

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Guide:
    - Widget: guide/widget.md
    - Admin Integration: guide/admin.md
    - Template Rendering: guide/templates.md
    - Media Cleanup: guide/cleanup.md
    - Configuration: guide/configuration.md
  - Customization:
    - Custom Renderer: customization/renderer.md
    - Custom Upload Handler: customization/upload-handler.md
    - Toolbar: customization/toolbar.md
    - Themes: customization/themes.md
  - Reference:
    - Settings: reference/settings.md
    - Management Commands: reference/commands.md
    - API: reference/api.md
  - Development: development.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list

<div class="md-editor{% if widget.theme == 'dark' %} md-editor--dark{% elif widget.theme == 'light' %} md-editor--light{% endif %}"
     data-upload-url="{{ widget.upload_url }}"
     data-finalize-url="{{ widget.finalize_url }}"
     style="--md-height: {{ widget.height }};">

  <script type="application/json" class="md-editor-config">{{ widget.toolbar_json|safe }}</script>

  <!-- Tabs + header controls -->
  <div class="md-editor-tabs">
    <button type="button" class="md-editor-tab md-editor-tab--active" data-tab="write">Write</button>
    <button type="button" class="md-editor-tab" data-tab="split">Split</button>
    <button type="button" class="md-editor-tab" data-tab="preview">Preview</button>

    <span class="md-editor-tabs-spacer"></span>

    <!-- Autosave toggle -->
    <label class="md-editor-autosave-toggle" title="Auto-save drafts to browser storage">
      <input type="checkbox" class="md-editor-autosave-checkbox" checked>
      <span class="md-editor-autosave-switch"></span>
      <span class="md-editor-autosave-label">Autosave</span>
    </label>

    <!-- Fullscreen button -->
    <button type="button" class="md-editor-fullscreen-btn" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" d="M1.75 10a.75.75 0 0 1 .75.75v2.5c0 .138.112.25.25.25h2.5a.75.75 0 0 1 0 1.5h-2.5A1.75 1.75 0 0 1 1 13.25v-2.5a.75.75 0 0 1 .75-.75Zm12.5 0a.75.75 0 0 1 .75.75v2.5A1.75 1.75 0 0 1 13.25 15h-2.5a.75.75 0 0 1 0-1.5h2.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 .75-.75ZM2.75 1h2.5a.75.75 0 0 1 0 1.5h-2.5a.25.25 0 0 0-.25.25v2.5a.75.75 0 0 1-1.5 0v-2.5C1 1.784 1.784 1 2.75 1Zm10.5 0A1.75 1.75 0 0 1 15 2.75v2.5a.75.75 0 0 1-1.5 0v-2.5a.25.25 0 0 0-.25-.25h-2.5a.75.75 0 0 1 0-1.5Z"/></svg>
    </button>
  </div>

  <!-- Toolbar -->
  <div class="md-editor-toolbar">
    <!-- Populated by JS from data-toolbar -->
  </div>

  <!-- Editor body -->
  <div class="md-editor-body">
    <!-- Write panel -->
    <div class="md-editor-write md-editor-panel--active">
      <textarea name="{{ widget.name }}"
                id="{{ widget.attrs.id }}"
                class="md-editor-textarea"
                placeholder="{{ widget.placeholder }}"
                {% for attr_name, attr_value in widget.attrs.items %}
                  {{ attr_name }}="{{ attr_value }}"
                {% endfor %}
      >{{ widget.value|default:'' }}</textarea>
    </div>

    <!-- Draggable split divider (only visible in split mode) -->
    <div class="md-editor-divider"></div>

    <!-- Preview panel -->
    <div class="md-editor-preview md-editor-panel--hidden">
      <div class="md-editor-preview-content"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="md-editor-footer">
    <span class="md-editor-footer-item">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M14.85 3H1.15C.52 3 0 3.52 0 4.15v7.69C0 12.48.52 13 1.15 13h13.69c.64 0 1.15-.52 1.15-1.15v-7.7C16 3.52 15.48 3 14.85 3zM9 11H7V8L5.5 9.92 4 8v3H2V5h2l1.5 2L7 5h2v6zm2.99.5L9.5 8H11V5h2v3h1.5l-2.51 3.5z"/></svg>
      Markdown is supported
    </span>
    <span class="md-editor-footer-item md-editor-footer-autosave-status"></span>
    <span class="md-editor-footer-item md-editor-footer-upload">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 5.5a2 2 0 1 1 3.163 1.627l-.075.065-.101.078A2 2 0 0 1 3.5 5.5zM5.5 5a.5.5 0 1 0 0 1 .5.5 0 0 0 0-1zM1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 13.5v-11zm1.5-.5a.5.5 0 0 0-.5.5v7.627l2.22-2.22a.75.75 0 0 1 1.06 0L8.31 10.94l3.22-3.22a.75.75 0 0 1 1.06 0l1.91 1.91V2.5a.5.5 0 0 0-.5-.5h-11z"/></svg>
      Paste, drop, or click to add files
    </span>
  </div>

  <!-- Hidden file input for attach button -->
  <input type="file" class="md-editor-file-input" style="display:none;" multiple>
</div>
